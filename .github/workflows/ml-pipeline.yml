name: ML Pipeline Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r src/requirements.txt
        pip install pytest flake8
    
    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Validate data files
      run: |
        python -c "
        import pandas as pd
        print('Validating data files...')
        
        df = pd.read_csv('data/sample_labeled_sentences.csv')
        print(f'sample_labeled_sentences.csv: {len(df)} rows')
        assert 'sentence' in df.columns, 'Missing sentence column'
        assert 'label' in df.columns, 'Missing label column'
        
        vdf = pd.read_csv('data/violations_policy_pairs.csv')
        print(f'violations_policy_pairs.csv: {len(vdf)} rows')
        assert 'policy_sentence' in vdf.columns
        assert 'violation_description' in vdf.columns
        
        print('All data files validated!')
        "
    
    - name: Test model imports
      run: |
        python -c "
        print('Testing imports...')
        from transformers import BertTokenizer, BertForSequenceClassification
        from transformers import AutoTokenizer, AutoModelForSequenceClassification
        import torch
        import pandas as pd
        print('All imports successful!')
        print(f'PyTorch version: {torch.__version__}')
        "

    - name: Validate results files
      run: |
        python -c "
        import pandas as pd
        print('Validating results...')
        
        nli = pd.read_csv('results/nli_results.csv')
        print(f'NLI results: {len(nli)} violations')
        assert nli['contradiction_score'].mean() > 0.5
        
        risk = pd.read_csv('results/risk_scores.csv')
        print(f'Risk scores: {len(risk)} apps')
        
        print('All validated!')
        print(f'Avg contradiction: {nli[\"contradiction_score\"].mean():.3f}')
        "
```

**Step 4:** Scroll down and click **"Commit new file"**

**Step 5:** Go to the **"Actions"** tab - you should see it running

